version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webshopping_db
    ports:
      - "5432:5432"
    networks:
      - rms_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: rms_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - rms_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: rms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@webshopping.lk
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    networks:
      - rms_network
    depends_on:
      - db

networks:
  rms_network:
    driver: bridge

volumes:
  postgres_data:
